<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wall Calendar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%
        }

        body {
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden
        }

        input,
        textarea,
        button {
            font-family: 'DM Sans', sans-serif
        }

        textarea {
            resize: vertical
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes backdropIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(32px) scale(0.94)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        @keyframes pinDrop {
            from {
                opacity: 0;
                transform: translateY(-12px) scale(0.95)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .cal-cur {
            transition: transform 0.12s, background 0.12s;
            cursor: pointer;
            user-select: none
        }

        .cal-cur:hover {
            transform: scale(1.15)
        }

        .sticky {
            transition: transform 0.22s ease, box-shadow 0.22s ease
        }

        .sticky:hover {
            transform: rotate(0deg) scale(1.06) translateY(-5px) !important;
            z-index: 20 !important;
            box-shadow: 2px 8px 28px rgba(0, 0, 0, 0.18) !important
        }

        .ibtn {
            transition: all 0.15s;
            cursor: pointer
        }

        .ibtn:hover {
            opacity: 0.82;
            transform: translateY(-1px)
        }

        .ibtn:active {
            transform: scale(0.96) translateY(0)
        }

        /* Delete X button on sticky */
        .del-x {
            position: absolute;
            top: 7px;
            right: 8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.15s, background 0.15s, transform 0.12s;
            z-index: 10;
        }

        .sticky:hover .del-x {
            opacity: 1
        }

        .del-x:hover {
            background: rgba(200, 50, 50, 0.22) !important;
            color: #c43232 !important;
            transform: scale(1.15)
        }

        /* Modal premium backdrop */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.52);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: backdropIn 0.22s ease;
        }

        .modal-card {
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            overflow: hidden;
            animation: modalSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.36), 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // ── CONSTANTS ────────────────────────────────────────────────────────────────
        const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const DAYS_S = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
        const TODAY = new Date();

        const BASE = [
            { name: "January", accent: "#3E78A0", img: "https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=900&q=75" },
            { name: "February", accent: "#B84C6A", img: "https://images.unsplash.com/photo-1518895312237-a9e23508077d?w=900&q=75" },
            { name: "March", accent: "#3D8E52", img: "https://images.unsplash.com/photo-1490750967868-88df5691cc3e?w=900&q=75" },
            { name: "April", accent: "#7050B0", img: "https://images.unsplash.com/photo-1501426026826-31c667bdf23d?w=900&q=75" },
            { name: "May", accent: "#9A7020", img: "https://images.unsplash.com/photo-1444021465936-c6ca81d39b84?w=900&q=75" },
            { name: "June", accent: "#CC5E30", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900&q=75" },
            { name: "July", accent: "#2568A8", img: "https://images.unsplash.com/photo-1506953823976-52e1fdc0149a?w=900&q=75" },
            { name: "August", accent: "#B87000", img: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=900&q=75" },
            { name: "September", accent: "#A84020", img: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=75" },
            { name: "October", accent: "#A03010", img: "https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=900&q=75" },
            { name: "November", accent: "#746050", img: "https://images.unsplash.com/photo-1479030160180-b1860951d696?w=900&q=75" },
            { name: "December", accent: "#25784A", img: "https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=900&q=75" },
        ];

        // ── UTILS ────────────────────────────────────────────────────────────────────
        const getDIM = (y, m) => new Date(y, m + 1, 0).getDate();
        const getFirst = (y, m) => new Date(y, m, 1).getDay();
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

        const rgba = (hex, a) => {
            if (!hex || hex.length < 7) return `rgba(128,128,128,${a})`;
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        };

        const shiftHex = (hex, amount) => {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            const clamp = v => Math.max(0, Math.min(255, v + amount));
            return `#${clamp(r).toString(16).padStart(2, '0')}${clamp(g).toString(16).padStart(2, '0')}${clamp(b).toString(16).padStart(2, '0')}`;
        };

        // ── FIX 4: Smooth heatmap color using HSL lightness scaling ─────────────────
        // Converts hex accent to HSL, then scales lightness linearly with intensity
        function heatmapColor(hex, intensity) {
            // intensity = count/maxCount ∈ (0,1]
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    default: h = ((r - g) / d + 4) / 6;
                }
            }
            // Lightness: 82% at lowest intensity → 28% at highest (smooth, no cap)
            const targetL = 0.82 - intensity * 0.54;
            // Saturation: 30% → 85% as intensity rises
            const targetS = Math.min(0.85, 0.30 + intensity * 0.55);
            // Convert HSL→hex
            const hue = h * 360;
            function hslToRgb(h, s, l) {
                const a = s * Math.min(l, 1 - l);
                const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1) };
                return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
            }
            const [rr, gg, bb] = hslToRgb(hue, targetS, targetL);
            return `rgb(${rr},${gg},${bb})`;
        }

        // Canvas-based dominant color extraction from data URL
        function extractAccent(dataUrl, cb) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                try {
                    const c = document.createElement('canvas'); c.width = c.height = 24;
                    const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 24, 24);
                    const px = ctx.getImageData(0, 0, 24, 24).data;
                    let rs = 0, gs = 0, bs = 0, n = 0;
                    for (let i = 0; i < px.length; i += 16) {
                        const r = px[i], g = px[i + 1], b = px[i + 2];
                        const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
                        const sat = mx === 0 ? 0 : (mx - mn) / mx;
                        const lum = (r * 299 + g * 587 + b * 114) / 1000;
                        if (sat > 0.2 && lum > 25 && lum < 225) { rs += r; gs += g; bs += b; n++; }
                    }
                    if (!n) { cb(null); return; }
                    const avg = (rs / n + gs / n + bs / n) / 3;
                    const boost = 1.5;
                    const clamp = v => Math.max(0, Math.min(255, Math.round(v)));
                    const fr = clamp(avg + (rs / n - avg) * boost);
                    const fg = clamp(avg + (gs / n - avg) * boost);
                    const fb = clamp(avg + (bs / n - avg) * boost);
                    cb(`#${fr.toString(16).padStart(2, '0')}${fg.toString(16).padStart(2, '0')}${fb.toString(16).padStart(2, '0')}`);
                } catch { cb(null); }
            };
            img.onerror = () => cb(null);
            img.src = dataUrl;
        }

        // ── HOOK: useTheme ───────────────────────────────────────────────────────────
        function useTheme(month, dark, customImg) {
            const base = BASE[month];
            const [extracted, setExtracted] = useState(null);

            useEffect(() => {
                if (!customImg) { setExtracted(null); return; }
                extractAccent(customImg, color => setExtracted(color));
            }, [customImg]);

            return useMemo(() => {
                const accent = extracted || base.accent;
                const accentLight = shiftHex(accent, 80);
                const accentXLight = shiftHex(accent, 110);

                const D = {
                    bg: '#121212', surface: '#1A1A1A', card: '#242424', elevated: '#2E2E2E',
                    text: '#EFEFEF', textSub: '#A0A0A0', textMuted: '#585858',
                    border: 'rgba(255,255,255,0.07)', borderAccent: rgba(accent, 0.38),
                    inputBg: '#2E2E2E', noteTints: ['#2A2A2A', '#262626', '#2C2C2C', '#282828'],
                };
                const L = {
                    bg: `#${accentXLight.slice(1)}22` || '#F7F7F7', surface: '#F4F4F4', card: '#FFFFFF', elevated: '#FFFFFF',
                    text: '#1A1A1A', textSub: '#6B6B6B', textMuted: '#B0B0B0',
                    border: 'rgba(0,0,0,0.07)', borderAccent: rgba(accent, 0.22),
                    inputBg: rgba(accent, 0.045), noteTints: [
                        rgba(accent, 0.08), rgba(accent, 0.12), rgba(accent, 0.065), rgba(accent, 0.10),
                    ],
                };
                const p = dark ? D : L;

                return {
                    name: base.name, img: base.img, accent,
                    bg: p.bg, cardBg: p.card, surface: p.surface, elevated: p.elevated,
                    textPrimary: p.text, textSecondary: p.textSub, textMuted: p.textMuted,
                    border: p.border, borderAccent: p.borderAccent, inputBg: p.inputBg,
                    noteBg: i => p.noteTints[i % 4],
                    dark,
                };
            }, [base, extracted, dark]);
        }

        // ── HOOK: useNotes ───────────────────────────────────────────────────────────
        function useNotes() {
            const [db, setDb] = useState({});
            const k = (y, m) => `${y}::${m}`;
            const get = (y, m) => db[k(y, m)] || [];
            const add = (y, m, n) => setDb(p => ({ ...p, [k(y, m)]: [...(p[k(y, m)] || []), { ...n, id: uid() }] }));
            const upd = (y, m, id, patch) => setDb(p => ({ ...p, [k(y, m)]: (p[k(y, m)] || []).map(n => n.id === id ? { ...n, ...patch } : n) }));
            const del = (y, m, id) => setDb(p => ({ ...p, [k(y, m)]: (p[k(y, m)] || []).filter(n => n.id !== id) }));
            return { get, add, upd, del };
        }

        function useWindowWidth() {
            const [w, setW] = useState(window.innerWidth);
            useEffect(() => { const h = () => setW(window.innerWidth); window.addEventListener('resize', h); return () => window.removeEventListener('resize', h) }, []);
            return w;
        }

        // ── HERO IMAGE ───────────────────────────────────────────────────────────────
        function HeroImage({ month, year, theme, custom, onUpload }) {
            const [err, setErr] = useState(false);
            const ref = useRef();
            const src = (!err && custom) ? custom : theme.img;
            return (
                <div style={{ position: 'relative', height: 192, overflow: 'hidden', flexShrink: 0 }}>
                    <img src={src} alt={theme.name} onError={() => setErr(true)}
                        style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', transition: 'opacity 0.4s' }} />
                    <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(165deg,transparent 20%,rgba(0,0,0,0.62) 100%)' }} />
                    <div style={{ position: 'absolute', bottom: 18, left: 22, color: '#fff' }}>
                        <div style={{
                            fontFamily: "'Playfair Display',serif", fontSize: 28, fontWeight: 700, letterSpacing: '-0.01em',
                            textShadow: '0 2px 14px rgba(0,0,0,0.5)', lineHeight: 1.1
                        }}>
                            {theme.name}
                        </div>
                        <div style={{ fontSize: 12.5, opacity: 0.72, marginTop: 3, letterSpacing: '0.07em' }}>{year}</div>
                    </div>
                    <button onClick={() => ref.current?.click()} className="ibtn" style={{
                        position: 'absolute', top: 13, right: 13,
                        background: 'rgba(255,255,255,0.15)', backdropFilter: 'blur(10px)',
                        border: '1px solid rgba(255,255,255,0.28)', borderRadius: 7,
                        color: '#fff', padding: '5px 12px', fontSize: 10, fontWeight: 600, letterSpacing: '0.09em',
                    }}>UPLOAD</button>
                    <input ref={ref} type="file" accept="image/*" style={{ display: 'none' }}
                        onChange={e => {
                            const f = e.target.files?.[0]; if (!f) return;
                            const r = new FileReader();
                            r.onload = ev => { onUpload(ev.target.result); setErr(false) };
                            r.readAsDataURL(f);
                        }} />
                </div>
            );
        }

        // ── CALENDAR DAY ─────────────────────────────────────────────────────────────
        function CalDay({ day, cur, isToday, theme, inRange, isStart, isEnd, noteCount, maxCount, heatmap, picking, onClick }) {
            if (!cur) return (
                <div style={{
                    width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    borderRadius: '50%', fontSize: 12, color: theme.textMuted, userSelect: 'none'
                }}>{day}</div>
            );

            let bg = 'transparent', color = theme.textPrimary, fw = 400, border = '1.5px solid transparent';
            let textColor = theme.textPrimary;

            // ── FIX 4: Heatmap with continuous HSL scaling, no premature cap ──
            if (heatmap && noteCount > 0 && maxCount > 0 && !isStart && !isEnd && !inRange) {
                const intensity = noteCount / maxCount; // always 0 < intensity ≤ 1, no cap
                bg = heatmapColor(theme.accent, intensity);
                // Use dark text for light heatmap cells, white for dark ones
                textColor = intensity > 0.55 ? '#ffffff' : theme.textPrimary;
            }

            if (inRange) { bg = rgba(theme.accent, 0.18); }
            if (isStart || isEnd) { bg = theme.accent; textColor = '#fff'; fw = 600; }
            if (isToday && !isStart && !isEnd) { fw = 600; border = `1.5px solid ${theme.accent}`; }

            return (
                <div className="cal-cur" onClick={() => onClick(day)} style={{
                    width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    borderRadius: '50%', background: bg, color: textColor, fontWeight: fw, fontSize: 12.5,
                    cursor: picking ? 'crosshair' : 'pointer', border, position: 'relative',
                }}>
                    {day}
                    {noteCount > 0 && !heatmap && (
                        <div style={{
                            position: 'absolute', bottom: 3, left: '50%', transform: 'translateX(-50%)',
                            width: 3.5, height: 3.5, borderRadius: '50%',
                            background: (isStart || isEnd) ? 'rgba(255,255,255,0.78)' : theme.accent,
                        }} />
                    )}
                </div>
            );
        }

        // ── CALENDAR GRID ─────────────────────────────────────────────────────────────
        function CalGrid({ year, month, theme, ranges, picking, onDay, notes, heatmap }) {
            const dim = getDIM(year, month), first = getFirst(year, month), pDim = getDIM(year, month === 0 ? 11 : month - 1);
            const cells = [];
            for (let i = first - 1; i >= 0; i--)cells.push({ d: pDim - i, cur: false });
            for (let d = 1; d <= dim; d++)cells.push({ d, cur: true });
            while (cells.length < 42) cells.push({ d: cells.length - first - dim + 1, cur: false });

            const countMap = useMemo(() => {
                const m = {};
                notes.forEach(n => {
                    if (!n.startDay) return;
                    const s = n.startDay, e = n.endDay || n.startDay;
                    for (let d = s; d <= e; d++)m[d] = (m[d] || 0) + 1;
                });
                return m;
            }, [notes]);
            // FIX 4: maxCount is dynamic — highest actual count in this month
            const maxCount = useMemo(() => Math.max(0, ...Object.values(countMap)), [countMap]);

            return (
                <div style={{ padding: '8px 14px 14px' }}>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: 4 }}>
                        {DAYS_S.map(d => (
                            <div key={d} style={{
                                textAlign: 'center', fontSize: 9.5, fontWeight: 600,
                                color: theme.textMuted, letterSpacing: '0.11em', padding: '4px 0'
                            }}>{d}</div>
                        ))}
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 1 }}>
                        {cells.map((c, i) => {
                            const nc = c.cur ? (countMap[c.d] || 0) : 0;
                            const iR = c.cur && ranges.some(r => {
                                const d = new Date(year, month, c.d);
                                return d > new Date(r.sy, r.sm, r.sd) && d < new Date(r.ey, r.em, r.ed);
                            });
                            const iS = c.cur && ranges.some(r => r.sd === c.d && r.sm === month && r.sy === year);
                            const iE = c.cur && ranges.some(r => r.ed === c.d && r.em === month && r.ey === year);
                            const iT = c.cur && c.d === TODAY.getDate() && month === TODAY.getMonth() && year === TODAY.getFullYear();
                            return (
                                <div key={i} style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CalDay day={c.d} cur={c.cur} isToday={iT}
                                        theme={theme} inRange={iR} isStart={iS} isEnd={iE}
                                        noteCount={nc} maxCount={maxCount}
                                        heatmap={heatmap} picking={picking} onClick={onDay} />
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── FIX 3: STICKY NOTE with X delete button ───────────────────────────────────
        function StickyNote({ note, theme, idx, onOpen, onDelete }) {
            const rots = ['-2.2deg', '1.9deg', '-1.4deg', '2.5deg'];
            const rot = rots[idx % 4];
            const bg = theme.noteBg(idx);
            const dl = note.startDay
                ? (note.endDay && note.endDay !== note.startDay ? `Day ${note.startDay}–${note.endDay}` : `Day ${note.startDay}`)
                : null;

            const handleDelete = e => {
                e.stopPropagation(); // don't open modal
                onDelete(note.id);
            };

            return (
                <div className="sticky" onClick={() => onOpen(note)} style={{
                    background: bg, border: `1px solid ${theme.borderAccent}`,
                    borderRadius: 4, padding: '16px 13px 20px',
                    cursor: 'pointer', transform: `rotate(${rot})`,
                    boxShadow: '1px 3px 10px rgba(0,0,0,0.10)',
                    width: 150, minHeight: 138, position: 'relative', flexShrink: 0,
                    animation: `pinDrop 0.28s ease ${idx * 0.06}s both`,
                }}>
                    {/* FIX 3: Delete X icon — visible on hover via CSS .sticky:hover .del-x */}
                    <button
                        className="del-x"
                        onClick={handleDelete}
                        title="Delete note"
                        style={{
                            background: theme.dark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.10)',
                            color: theme.dark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)',
                        }}
                    >✕</button>

                    {/* Pin */}
                    <div style={{
                        position: 'absolute', top: -8, left: '50%', transform: 'translateX(-50%)',
                        width: 13, height: 13, borderRadius: '50%', background: theme.accent,
                        boxShadow: `0 2px 6px ${rgba(theme.accent, 0.48)}`
                    }} />

                    <div style={{
                        fontFamily: "'Playfair Display',serif", fontSize: 13.5, fontWeight: 600,
                        color: theme.textPrimary, marginBottom: 6, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                        paddingRight: 16
                    }}>
                        {note.title || 'Untitled'}
                    </div>
                    <div style={{
                        fontSize: 11.5, color: theme.textSecondary, lineHeight: 1.55,
                        overflow: 'hidden', display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical'
                    }}>
                        {note.desc || 'Click to view…'}
                    </div>
                    {dl && <div style={{
                        position: 'absolute', bottom: 9, left: 11, right: 11, fontSize: 9.5, fontWeight: 600,
                        color: theme.accent, letterSpacing: '0.05em', borderTop: `1px solid ${rgba(theme.accent, 0.15)}`, paddingTop: 5
                    }}>{dl}</div>}
                </div>
            );
        }

        // ── FIX 1: PREMIUM NOTE MODAL ─────────────────────────────────────────────────
        function NoteModal({ mode, note, theme, onSave, onClose, onEdit, onDelete }) {
            const [title, setTitle] = useState(note?.title || '');
            const [desc, setDesc] = useState(note?.desc || '');
            const [sd, setSd] = useState(note?.startDay != null ? String(note.startDay) : '');
            const [ed, setEd] = useState(note?.endDay != null ? String(note.endDay) : '');
            const isView = mode === 'view', isCreate = mode === 'create';

            useEffect(() => {
                setTitle(note?.title || ''); setDesc(note?.desc || '');
                setSd(note?.startDay != null ? String(note.startDay) : '');
                setEd(note?.endDay != null ? String(note.endDay) : '');
            }, [mode, note?.id]);

            useEffect(() => {
                const h = e => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
            }, [onClose]);

            const tc = theme.textPrimary, muted = theme.textSecondary;
            const ib = theme.inputBg, br = theme.borderAccent;
            const dl = note?.startDay
                ? (note.endDay && note.endDay !== note.startDay ? `Day ${note.startDay} – ${note.endDay}` : `Day ${note.startDay}`)
                : null;

            const iStyle = {
                width: '100%', padding: '10px 14px', borderRadius: 10,
                border: `1px solid ${br}`, background: ib, color: tc,
                fontSize: 13.5, outline: 'none', lineHeight: 1.55,
                transition: 'border-color 0.15s,box-shadow 0.15s',
            };

            return (
                <div className="modal-backdrop" onClick={onClose}>
                    <div className="modal-card" onClick={e => e.stopPropagation()}
                        style={{ background: theme.elevated }}>

                        {/* ── Premium accent header ── */}
                        <div style={{
                            background: `linear-gradient(135deg, ${theme.accent} 0%, ${shiftHex(theme.accent, -30)} 100%)`,
                            padding: '24px 24px 20px',
                            position: 'relative',
                            overflow: 'hidden',
                        }}>
                            {/* Decorative circle */}
                            <div style={{
                                position: 'absolute', top: -28, right: -28, width: 110, height: 110,
                                borderRadius: '50%', background: 'rgba(255,255,255,0.08)', pointerEvents: 'none',
                            }} />
                            <div style={{
                                position: 'absolute', bottom: -40, left: 60, width: 80, height: 80,
                                borderRadius: '50%', background: 'rgba(255,255,255,0.05)', pointerEvents: 'none',
                            }} />

                            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, position: 'relative' }}>
                                <div style={{ flex: 1 }}>
                                    {/* Mode label */}
                                    <div style={{
                                        fontSize: 9, fontWeight: 700, letterSpacing: '0.18em',
                                        color: 'rgba(255,255,255,0.6)', marginBottom: 8,
                                    }}>
                                        {isCreate ? '✦ NEW NOTE' : mode === 'edit' ? '✦ EDITING' : '✦ NOTE'}
                                    </div>

                                    {isView ? (
                                        <div style={{
                                            fontFamily: "'Playfair Display',serif",
                                            fontSize: 24, fontWeight: 700, color: '#fff', lineHeight: 1.2,
                                            wordBreak: 'break-word', letterSpacing: '-0.01em',
                                        }}>
                                            {note?.title || 'Untitled'}
                                        </div>
                                    ) : (
                                        <input value={title} onChange={e => setTitle(e.target.value)}
                                            autoFocus placeholder={isCreate ? 'Give it a title…' : 'Edit title…'}
                                            style={{
                                                background: 'rgba(255,255,255,0.15)',
                                                border: '1px solid rgba(255,255,255,0.28)',
                                                borderRadius: 10, padding: '8px 14px',
                                                color: '#fff', fontSize: 19, fontWeight: 600,
                                                fontFamily: "'Playfair Display',serif",
                                                outline: 'none', width: '100%',
                                                backdropFilter: 'blur(4px)',
                                                '::placeholder': { color: 'rgba(255,255,255,0.5)' },
                                            }} />
                                    )}

                                    {dl && isView && (
                                        <div style={{
                                            marginTop: 12, display: 'inline-flex', alignItems: 'center', gap: 6,
                                            background: 'rgba(255,255,255,0.18)', backdropFilter: 'blur(6px)',
                                            borderRadius: 20, padding: '4px 13px',
                                            fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.92)',
                                            letterSpacing: '0.04em',
                                        }}>
                                            📅 {dl}
                                        </div>
                                    )}
                                </div>

                                {/* Close button */}
                                <button onClick={onClose} className="ibtn" style={{
                                    background: 'rgba(255,255,255,0.16)',
                                    border: '1px solid rgba(255,255,255,0.22)',
                                    backdropFilter: 'blur(8px)',
                                    borderRadius: 10, color: '#fff', fontSize: 16,
                                    width: 34, height: 34, flexShrink: 0,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    marginTop: isView ? 22 : 24,
                                }}>×</button>
                            </div>
                        </div>

                        {/* ── Modal body ── */}
                        <div style={{ padding: '22px 24px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>

                            {/* Description */}
                            {isView ? (
                                <div style={{
                                    fontSize: 14, color: tc, lineHeight: 1.78, minHeight: 56,
                                    whiteSpace: 'pre-wrap', padding: '2px 0',
                                }}>
                                    {note?.desc
                                        ? note.desc
                                        : <span style={{ color: muted, fontStyle: 'italic', fontSize: 13 }}>No description added yet.</span>
                                    }
                                </div>
                            ) : (
                                <div>
                                    <label style={{
                                        display: 'block', fontSize: 9, fontWeight: 700, color: theme.accent,
                                        letterSpacing: '0.15em', marginBottom: 7
                                    }}>DESCRIPTION</label>
                                    <textarea value={desc} onChange={e => setDesc(e.target.value)}
                                        placeholder="Write your thoughts…" rows={4} style={iStyle} />
                                </div>
                            )}

                            {/* Date range — edit/create only */}
                            {!isView && (
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                    <div>
                                        <label style={{
                                            display: 'block', fontSize: 9, fontWeight: 700, color: theme.accent,
                                            letterSpacing: '0.15em', marginBottom: 7
                                        }}>FROM (day)</label>
                                        <input type="number" value={sd} onChange={e => setSd(e.target.value)}
                                            min={1} max={31} placeholder="e.g. 5" style={iStyle} />
                                    </div>
                                    <div>
                                        <label style={{
                                            display: 'block', fontSize: 9, fontWeight: 700, color: theme.accent,
                                            letterSpacing: '0.15em', marginBottom: 7
                                        }}>TO (day)</label>
                                        <input type="number" value={ed} onChange={e => setEd(e.target.value)}
                                            min={1} max={31} placeholder="optional" style={iStyle} />
                                    </div>
                                </div>
                            )}

                            {/* ── Footer actions ── */}
                            <div style={{
                                display: 'flex', gap: 10, marginTop: 4,
                                paddingTop: 16, borderTop: `1px solid ${theme.border}`,
                            }}>
                                {isView ? (
                                    <>
                                        <button onClick={onEdit} className="ibtn" style={{
                                            flex: 1, padding: '11px 16px', borderRadius: 11, border: 'none',
                                            background: theme.accent, color: '#fff', fontWeight: 600, fontSize: 13.5,
                                            letterSpacing: '0.03em',
                                            boxShadow: `0 4px 16px ${rgba(theme.accent, 0.38)}`,
                                        }}>Edit Note</button>
                                        <button onClick={() => onDelete(note.id)} className="ibtn" style={{
                                            padding: '11px 16px', borderRadius: 11,
                                            border: `1px solid rgba(200,50,50,0.28)`,
                                            background: 'rgba(200,50,50,0.07)',
                                            color: '#c43232', fontWeight: 600, fontSize: 13,
                                        }}>Delete</button>
                                    </>
                                ) : (
                                    <>
                                        <button onClick={() => onSave({ title, desc, startDay: sd ? +sd : null, endDay: ed ? +ed : null })} className="ibtn" style={{
                                            flex: 1, padding: '11px 16px', borderRadius: 11, border: 'none',
                                            background: theme.accent, color: '#fff', fontWeight: 600, fontSize: 13.5,
                                            letterSpacing: '0.03em',
                                            boxShadow: `0 4px 16px ${rgba(theme.accent, 0.38)}`,
                                        }}>Save Note</button>
                                        <button onClick={onClose} className="ibtn" style={{
                                            padding: '11px 18px', borderRadius: 11,
                                            border: `1px solid ${br}`, background: 'transparent',
                                            color: muted, fontWeight: 600, fontSize: 13,
                                        }}>Cancel</button>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ── FIX 2: NOTES BOARD with height constraint and scrolling ──────────────────
        function NotesBoard({ month, theme, notes, onOpenCreate, onOpenNote, onDeleteNote, calHeight }) {
            const tc = theme.textPrimary;

            return (
                <div style={{
                    background: theme.cardBg, borderRadius: 18, overflow: 'hidden',
                    boxShadow: '0 4px 24px rgba(0,0,0,0.08)',
                    display: 'flex', flexDirection: 'column',
                    // FIX 2: Constrain to calendar card height; allow scroll inside
                    height: calHeight ? `${calHeight}px` : 'auto',
                    maxHeight: calHeight ? `${calHeight}px` : 'none',
                    transition: 'background 0.3s',
                }}>
                    {/* Fixed header */}
                    <div style={{
                        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                        padding: '18px 22px 14px', borderBottom: `1px solid ${theme.border}`,
                        flexShrink: 0,
                    }}>
                        <div>
                            <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 18, fontWeight: 700, color: tc }}>{MONTHS[month]}</div>
                            <div style={{ fontSize: 10.5, color: theme.accent, fontWeight: 500, letterSpacing: '0.09em', marginTop: 1 }}>
                                {notes.length} NOTE{notes.length !== 1 ? 'S' : ''}
                            </div>
                        </div>
                        <button onClick={onOpenCreate} className="ibtn" style={{
                            padding: '8px 18px', borderRadius: 9, border: 'none',
                            background: theme.accent, color: '#fff', fontWeight: 600, fontSize: 11.5, letterSpacing: '0.06em',
                        }}>+ NEW</button>
                    </div>

                    {/* Scrollable notes area */}
                    <div style={{
                        flex: 1,
                        overflowY: 'auto',
                        padding: '22px 20px 26px',
                        // FIX 2: smooth scroll
                        scrollBehavior: 'smooth',
                    }}>
                        {notes.length === 0 ? (
                            <div style={{ padding: '36px 0', textAlign: 'center' }}>
                                <div style={{ fontSize: 38, marginBottom: 12 }}>📌</div>
                                <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 15, color: theme.textMuted, marginBottom: 7 }}>
                                    No notes for {MONTHS[month]}
                                </div>
                                <div style={{ fontSize: 12, color: theme.textMuted, lineHeight: 1.75 }}>
                                    Select a date range on the calendar<br />then "Add Note" — or tap + NEW
                                </div>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 20, paddingTop: 10 }}>
                                {notes.map((n, i) => (
                                    <StickyNote key={n.id} note={n} theme={theme} idx={i}
                                        onOpen={onOpenNote}
                                        onDelete={onDeleteNote} />
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── ROOT APP ─────────────────────────────────────────────────────────────────
        function App() {
            const [year, setYear] = useState(TODAY.getFullYear());
            const [month, setMonth] = useState(TODAY.getMonth());
            const [dark, setDark] = useState(false);
            const [heatmap, setHeatmap] = useState(false);
            const [customImgs, setCustomImgs] = useState({});
            const [ranges, setRanges] = useState([]);
            const [pickStart, setPickStart] = useState(null);
            const [rangeTooltip, setRangeTooltip] = useState(null);
            const [modal, setModal] = useState(null);

            // FIX 2: measure calendar card height to sync notes board
            const calRef = useRef(null);
            const [calHeight, setCalHeight] = useState(null);

            useEffect(() => {
                if (!calRef.current) return;
                const ro = new ResizeObserver(entries => {
                    for (const e of entries) setCalHeight(e.contentRect.height);
                });
                ro.observe(calRef.current);
                return () => ro.disconnect();
            }, []);

            const { get, add, upd, del } = useNotes();
            const mKey = `${year}::${month}`;
            const notes = get(year, month);
            const customImg = customImgs[mKey] || null;
            const theme = useTheme(month, dark, customImg);
            const w = useWindowWidth();
            const isMob = w < 700;

            const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y - 1) } else setMonth(m => m - 1) };
            const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y + 1) } else setMonth(m => m + 1) };

            const handleDay = useCallback(day => {
                if (!pickStart) { setPickStart({ d: day, m: month, y: year }); }
                else {
                    let s = pickStart, e = { d: day, m: month, y: year };
                    if (new Date(s.y, s.m, s.d) > new Date(e.y, e.m, e.d)) [s, e] = [e, s];
                    const r = { sd: s.d, sm: s.m, sy: s.y, ed: e.d, em: e.m, ey: e.y, id: uid() };
                    setRanges(p => [...p, r]);
                    setPickStart(null);
                    setRangeTooltip({ sd: r.sd, ed: r.ed });
                }
            }, [pickStart, month, year]);

            const handleModalSave = data => {
                if (modal?.note?.id) upd(year, month, modal.note.id, data);
                else add(year, month, data);
                setModal(null);
            };
            const handleModalDelete = id => { del(year, month, id); setModal(null) };

            // FIX 3: direct delete from sticky (no modal)
            const handleDirectDelete = id => { del(year, month, id) };

            const Btn = ({ label, active, onClick }) => (
                <button onClick={onClick} className="ibtn" style={{
                    padding: '5px 13px', borderRadius: 20,
                    border: `1px solid ${rgba(theme.accent, 0.35)}`,
                    background: active ? theme.accent : 'transparent',
                    color: active ? '#fff' : theme.accent,
                    fontSize: 11, fontWeight: 600, letterSpacing: '0.06em',
                }}>{label}</button>
            );

            return (
                <div style={{
                    fontFamily: "'DM Sans',sans-serif",
                    background: theme.bg,
                    minHeight: '100vh',
                    padding: isMob ? '12px' : '20px 24px',
                    transition: 'background 0.35s ease',
                }}>
                    {/* FIX 2: Stretch both columns to same height via align-items:stretch */}
                    <div style={{
                        maxWidth: 1100, margin: '0 auto',
                        display: isMob ? 'block' : 'grid',
                        gridTemplateColumns: 'minmax(288px,358px) 1fr',
                        gap: 20,
                        alignItems: 'stretch', // ← KEY FIX: both children stretch to same height
                    }}>

                        {/* CALENDAR CARD */}
                        <div ref={calRef} style={{
                            background: theme.cardBg, borderRadius: 18, overflow: 'hidden',
                            boxShadow: dark ? '0 8px 44px rgba(0,0,0,0.5)' : '0 4px 24px rgba(0,0,0,0.08)',
                            marginBottom: isMob ? 18 : 0,
                            transition: 'background 0.3s,box-shadow 0.3s',
                            display: 'flex', flexDirection: 'column',
                        }}>
                            <HeroImage month={month} year={year} theme={theme} custom={customImg}
                                onUpload={img => setCustomImgs(p => ({ ...p, [mKey]: img }))} />

                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px 4px' }}>
                                <button onClick={prevMonth} style={{
                                    background: 'none', border: 'none', cursor: 'pointer',
                                    fontSize: 22, color: theme.accent, padding: '2px 8px', lineHeight: 1
                                }}>‹</button>
                                <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 15.5, fontWeight: 700, color: theme.textPrimary }}>
                                    {MONTHS[month]} {year}
                                </div>
                                <button onClick={nextMonth} style={{
                                    background: 'none', border: 'none', cursor: 'pointer',
                                    fontSize: 22, color: theme.accent, padding: '2px 8px', lineHeight: 1
                                }}>›</button>
                            </div>

                            {pickStart && (
                                <div style={{
                                    margin: '6px 14px 0', padding: '8px 13px', borderRadius: 9,
                                    background: rgba(theme.accent, 0.09),
                                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                    fontSize: 11.5, color: theme.accent, fontWeight: 500,
                                    animation: 'fadeUp 0.18s ease',
                                }}>
                                    <span>Click an end date to complete the range</span>
                                    <button onClick={() => setPickStart(null)} style={{
                                        background: 'none', border: 'none',
                                        cursor: 'pointer', fontSize: 15, color: theme.accent, lineHeight: 1
                                    }}>×</button>
                                </div>
                            )}

                            <CalGrid year={year} month={month} theme={theme}
                                ranges={ranges} picking={!!pickStart} onDay={handleDay}
                                notes={notes} heatmap={heatmap} />

                            {rangeTooltip && (
                                <div style={{
                                    margin: '0 14px 12px', padding: '10px 14px', borderRadius: 10,
                                    background: rgba(theme.accent, 0.09), border: `1px solid ${rgba(theme.accent, 0.26)}`,
                                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                    flexWrap: 'wrap', gap: 8, animation: 'fadeUp 0.2s ease',
                                }}>
                                    <span style={{ fontSize: 12.5, color: theme.accent, fontWeight: 500 }}>
                                        Day {rangeTooltip.sd}–{rangeTooltip.ed} · Add a note?
                                    </span>
                                    <div style={{ display: 'flex', gap: 6 }}>
                                        <button onClick={() => {
                                            setModal({ mode: 'create', note: { startDay: rangeTooltip.sd, endDay: rangeTooltip.ed } });
                                            setRangeTooltip(null);
                                        }} className="ibtn" style={{
                                            padding: '5px 13px', borderRadius: 7, border: 'none',
                                            background: theme.accent, color: '#fff', fontWeight: 600, fontSize: 11.5
                                        }}>Add Note</button>
                                        <button onClick={() => setRangeTooltip(null)} className="ibtn" style={{
                                            padding: '5px 9px', borderRadius: 7,
                                            border: `1px solid ${rgba(theme.accent, 0.35)}`, background: 'none',
                                            color: theme.accent, fontSize: 11.5
                                        }}>✕</button>
                                    </div>
                                </div>
                            )}

                            <div style={{ padding: '6px 14px 18px', display: 'flex', gap: 7, flexWrap: 'wrap', marginTop: 'auto' }}>
                                <Btn label={dark ? '☀ Light' : '☾ Dark'} active={false} onClick={() => setDark(d => !d)} />
                                <Btn label="⊞ Heatmap" active={heatmap} onClick={() => setHeatmap(h => !h)} />
                                <Btn label="✕ Ranges" active={false} onClick={() => { setRanges([]); setPickStart(null); setRangeTooltip(null) }} />
                            </div>
                        </div>

                        {/* NOTES BOARD — FIX 2: receives calHeight for sync */}
                        <NotesBoard month={month} theme={theme} notes={notes}
                            calHeight={isMob ? null : calHeight}
                            onOpenCreate={() => setModal({ mode: 'create', note: {} })}
                            onOpenNote={n => setModal({ mode: 'view', note: n })}
                            onDeleteNote={handleDirectDelete} />
                    </div>

                    {/* GLOBAL MODAL — FIX 1: premium, blurred backdrop */}
                    {modal && (
                        <NoteModal
                            mode={modal.mode}
                            note={modal.note}
                            theme={theme}
                            onSave={handleModalSave}
                            onClose={() => setModal(null)}
                            onEdit={() => setModal(m => ({ ...m, mode: 'edit' }))}
                            onDelete={handleModalDelete} />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
